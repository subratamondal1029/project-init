name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  version_check:
    name: Check Version Changed
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @subratamondal/project-init version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version has not changed."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Version has changed $REMOTE to $LOCAL"
          fi

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: version_check
    if: needs.version_check.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm type:check

      - name: Lint Check
        run: pnpm lint:check

      - name: Format Check
        run: pnpm format:check

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: [version_check, quality]
    if: needs.version_check.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm publish --no-git-checks --provenance
